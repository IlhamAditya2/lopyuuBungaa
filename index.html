<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bunga Sayang</title>
    <link rel="icon" type="image/png" href="image/kupu2.png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="preload">
        <div class="heart-loader">
            <div class="heart-icon"></div>
        </div>
        <div class="loading-text">Tunggu sebentar ya...</div>
    </div>

    <div class="main" style="background-image: url('image/bg1.png')">
        <div class="elements">
            <img src="image/bg.png" class="bg" onerror="this.style.display='none'">
            <div class="butterfly"><img src="image/kupu2.png" width="100" onerror="this.style.display='none'"></div>
            <img src="image/bungaMatahari.png" class="flower" onerror="this.style.display='none'">
        </div>

        <div class="book" id="book"></div>

        <div class="btn-container">
            <button class="open-btn">Open</button>
            <div class="nav">
                <button class="prev-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#fff" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
                    </svg>
                </button>
                <button class="next-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#fff" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
                    </svg>
                </button>
            </div>
            
            <button class="pesan-btn">Kirim Pesan</button>
        </div>
    </div>  

    <script src="js/script.js"></script>

    <script>
        // SCRIPT LOADING SCREEN
        window.addEventListener('load', function() {
            const preload = document.querySelector('.preload');
            const main = document.querySelector('.main');
            let sudahMasuk = false; 

            function selesaikanLoading() {
                if (sudahMasuk) return; 
                sudahMasuk = true;

                preload.style.opacity = '0';
                
                setTimeout(() => {
                    preload.style.display = 'none';
                    main.classList.add('appear'); 
                }, 500); 
            }

            const timerOtomatis = setTimeout(selesaikanLoading, 4000);

            preload.addEventListener('click', function() {
                clearTimeout(timerOtomatis);
                selesaikanLoading();
            });
        });

        // INIT EMAILJS
        (function() {
            emailjs.init({
              publicKey: "ttovEmiUzM-OefJen",
            });
        })();

        // TRIK MEMBAJAK TOMBOL ASLI DARI LUAR JS OBFUSCATE
        // Kita beri sedikit delay agar script bawaan selesai memuat dulu, lalu kita timpa fungsinya
        setTimeout(() => {
            const tombolPesanAsli = document.querySelector('.pesan-btn');
            
            // Menimpa fungsi klik bawaan dengan fungsi EmailJS kita
            tombolPesanAsli.onclick = async function(e) {
                e.preventDefault(); // Mencegah fungsi lama berjalan

                const { value: text } = await Swal.fire({
                    title: 'Tulis Pesan untukku',
                    input: 'textarea',
                    inputPlaceholder: 'Ketik pesan manismu di sini...',
                    showCancelButton: true,
                    confirmButtonText: 'Kirim',
                    cancelButtonText: 'Batal'
                });

                if (text) {
                    // Munculkan pop-up loading pengiriman
                    Swal.fire({
                        title: 'Mengirim pesan...',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    // Proses kirim ke Email menggunakan ID dari dashboard-mu
                    emailjs.send("service_7k2p2lr", "template_lerkx4g", {
                        message: text,
                    })
                    .then(function(response) {
                        Swal.fire({
                            title: 'Terkirim!',
                            text: 'Pesan manismu sudah sampai ke emailku.',
                            icon: 'success'
                        });
                    }, function(error) {
                        Swal.fire({
                            title: 'Gagal!',
                            text: 'Ada kesalahan jaringan, coba lagi ya.',
                            icon: 'error'
                        });
                        console.log('Error pengiriman:', error);
                    });
                }
            };
        }, 1000); // jeda 1 detik untuk memastikan script bajakan sukses ditanam

    </script>
</body>

</html>
