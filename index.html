<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For You</title>
    <link rel="icon" type="image/png" href="image/kupu2.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;700&display=swap" rel="stylesheet">
    <link  rel="stylesheet" href="css/style.css">
   
</head>

<body>

    <div class="preload">
        <div class="heart-loader">
            <div class="heart-icon"></div>
        </div>
        <div class="loading-text">Tunggu sebentar ya...</div>
    </div>

    <div class="main" style="background-image: url('image/bg1.png')">
        <div class="elements">
            <img src="image/bg.png" class="bg" onerror="this.style.display='none'">
            <div class="butterfly"><img src="image/kupu2.png" width="100" onerror="this.style.display='none'"></div>
            <img src="image/bungaMatahari.png" class="flower" onerror="this.style.display='none'">
        </div>

        <div class="book" id="book"></div>

        <div class="btn-container">
            <button class="open-btn">Open</button>
            <div class="nav">
                <button class="prev-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#fff" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
                    </svg>
                </button>
                <button class="next-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#fff" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
                    </svg>
                </button>
            </div>
            <button class="pesan-btn">Kirim Pesan</button>
        </div>
    </div>  

    <script src="js/script.js"></script>

    <script>
        window.addEventListener('load', function() {
            const preload = document.querySelector('.preload');
            const main = document.querySelector('.main');
            let sudahMasuk = false; 

            function selesaikanLoading() {
                if (sudahMasuk) return; 
                sudahMasuk = true;

                preload.style.opacity = '0';
                
                setTimeout(() => {
                    preload.style.display = 'none';
                    main.classList.add('appear'); 
                }, 500); 
            }

            const timerOtomatis = setTimeout(selesaikanLoading, 4000);

            preload.addEventListener('click', function() {
                clearTimeout(timerOtomatis);
                selesaikanLoading();
            });
        });
    </script>
</body>

</html>
